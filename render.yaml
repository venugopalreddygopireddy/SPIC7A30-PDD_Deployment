services:
  - type: web
    name: cortisense-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cortisense-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.9.0

databases:
  - name: cortisense-db
    plan: free
